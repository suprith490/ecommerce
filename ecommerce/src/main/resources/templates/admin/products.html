<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Products · Suprith Store Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">

<div th:replace="~{admin/fragments/sidebar :: sidebar('products')}"></div>
<div th:replace="~{admin/fragments/topnav :: topnav('Products')}"></div>

<main class="admin-main">

    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0" id="resultCount">Loading products…</p>
        <button class="btn btn-gradient" id="addProductBtn"><i class="fa-solid fa-plus me-2"></i>Add product</button>
    </div>

    <div class="glass-card p-3">
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                <tr>
                    <th></th>
                    <th>Name</th>
                    <th>SKU</th>
                    <th>Category</th>
                    <th>Price</th>
                    <th>Stock</th>
                    <th>Status</th>
                    <th class="text-end">Actions</th>
                </tr>
                </thead>
                <tbody id="productsBody">
                <tr><td colspan="8"><div class="skeleton" style="height:1.2rem"></div></td></tr>
                </tbody>
            </table>
        </div>

        <nav class="d-flex justify-content-between align-items-center mt-3">
            <span class="small text-muted" id="pageLabel"></span>
            <div class="btn-group">
                <button class="btn btn-sm btn-light" id="prevPageBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn btn-sm btn-light" id="nextPageBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </nav>
    </div>
</main>

<!-- Add / Edit Product Modal -->
<div class="modal fade" id="productModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="productModalTitle">Add product</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="productForm">
                <div class="modal-body">
                    <input type="hidden" id="productId">

                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Name</label>
                            <input type="text" class="form-control" id="pName" required>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">SKU</label>
                            <input type="text" class="form-control font-mono" id="pSku" required>
                        </div>

                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Category</label>
                            <select class="form-select" id="pCategory" required></select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label small fw-semibold">Brand (optional)</label>
                            <select class="form-select" id="pBrand">
                                <option value="">— No brand —</option>
                            </select>
                        </div>

                        <div class="col-md-4">
                            <label class="form-label small fw-semibold">Price (₹)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="pPrice" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold">Offer price (₹)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="pOfferPrice">
                        </div>
                        <div class="col-md-4">
                            <label class="form-label small fw-semibold">Stock</label>
                            <input type="number" min="0" class="form-control" id="pStock" required>
                        </div>

                        <div class="col-12">
                            <label class="form-label small fw-semibold">Description</label>
                            <textarea class="form-control" id="pDescription" rows="3"></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label small fw-semibold">Specifications</label>
                            <textarea class="form-control" id="pSpecifications" rows="2" placeholder="e.g. Material, dimensions, warranty…"></textarea>
                        </div>

                        <div class="col-12">
                            <div class="d-flex justify-content-between align-items-center">
                                <label class="form-label small fw-semibold mb-0">Images (URLs)</label>
                                <button type="button" class="btn btn-sm btn-light" id="addImageRowBtn">
                                    <i class="fa-solid fa-plus me-1"></i>Add image
                                </button>
                            </div>
                            <div id="imageRows" class="d-flex flex-column gap-2 mt-2"></div>
                        </div>

                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="pActive" checked>
                                <label class="form-check-label small" for="pActive">Visible on storefront</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-gradient">Save product</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/admin-common.js}"></script>
<script th:src="@{/js/admin-products.js}"></script>
</body>
</html>
