<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Brands · Suprith Store Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">

<div th:replace="~{admin/fragments/sidebar :: sidebar('brands')}"></div>
<div th:replace="~{admin/fragments/topnav :: topnav('Brands')}"></div>

<main class="admin-main">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0" id="resultCount">Loading brands…</p>
        <button class="btn btn-gradient" id="addBrandBtn"><i class="fa-solid fa-plus me-2"></i>Add brand</button>
    </div>

    <div class="glass-card p-3">
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead><tr><th></th><th>Name</th><th>Slug</th><th>Status</th><th class="text-end">Actions</th></tr></thead>
                <tbody id="brandsBody">
                <tr><td colspan="5"><div class="skeleton" style="height:1.2rem"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal fade" id="brandModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="brandModalTitle">Add brand</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="brandForm">
                <div class="modal-body">
                    <input type="hidden" id="brandId">
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Name</label>
                        <input type="text" class="form-control" id="bName" required>
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Logo URL</label>
                        <input type="url" class="form-control" id="bLogo" placeholder="https://…">
                    </div>
                    <div class="mb-3">
                        <label class="form-label small fw-semibold">Description</label>
                        <textarea class="form-control" id="bDescription" rows="2"></textarea>
                    </div>
                    <div class="form-check form-switch">
                        <input class="form-check-input" type="checkbox" id="bActive" checked>
                        <label class="form-check-label small" for="bActive">Visible on storefront</label>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-gradient">Save brand</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/admin-common.js}"></script>
<script th:src="@{/js/admin-brands.js}"></script>
</body>
</html>
