<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Shop all products · Suprith Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
</head>
<body class="storefront">

<div th:replace="~{store/fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <div class="row g-4">
        <!-- Filters -->
        <aside class="col-12 col-lg-3">
            <div class="card-surface p-3 mb-3">
                <h2 class="h6 fw-bold mb-3">Category</h2>
                <div id="categoryFilters" class="d-flex flex-column gap-2 small">
                    <div class="skeleton" style="height:1rem"></div>
                </div>
            </div>
            <div class="card-surface p-3 mb-3">
                <h2 class="h6 fw-bold mb-3">Brand</h2>
                <div id="brandFilters" class="d-flex flex-column gap-2 small">
                    <div class="skeleton" style="height:1rem"></div>
                </div>
            </div>
            <button class="btn btn-outline-brand w-100" id="clearFiltersBtn">Clear filters</button>
        </aside>

        <!-- Results -->
        <section class="col-12 col-lg-9">
            <div class="d-flex justify-content-between align-items-center mb-3 flex-wrap gap-2">
                <p class="text-muted mb-0" id="resultCount">Loading products…</p>
                <select class="form-select form-select-sm" style="max-width:220px" id="sortSelect">
                    <option value="createdAt:desc">Newest first</option>
                    <option value="price:asc">Price: Low to High</option>
                    <option value="price:desc">Price: High to Low</option>
                    <option value="averageRating:desc">Top rated</option>
                </select>
            </div>

            <div class="row g-3" id="productsGrid">
                <div class="col-6 col-md-4"><div class="skeleton" style="height:280px"></div></div>
                <div class="col-6 col-md-4"><div class="skeleton" style="height:280px"></div></div>
                <div class="col-6 col-md-4"><div class="skeleton" style="height:280px"></div></div>
            </div>

            <nav class="d-flex justify-content-between align-items-center mt-4">
                <span class="small text-muted" id="pageLabel"></span>
                <div class="btn-group">
                    <button class="btn btn-sm btn-light" id="prevPageBtn"><i class="fa-solid fa-chevron-left"></i></button>
                    <button class="btn btn-sm btn-light" id="nextPageBtn"><i class="fa-solid fa-chevron-right"></i></button>
                </div>
            </nav>
        </section>
    </div>
</main>

<div th:replace="~{store/fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/storefront-common.js}"></script>
<script th:src="@{/js/store-products.js}"></script>
</body>
</html>
