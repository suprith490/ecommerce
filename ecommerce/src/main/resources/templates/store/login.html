<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login · Suprith Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
</head>
<body class="storefront">

<div th:replace="~{store/fragments/navbar :: navbar}"></div>

<main class="container">
    <div class="auth-card card-surface p-4 p-md-5">
        <div class="text-center mb-4">
            <h1 class="h3 fw-bold">Welcome back</h1>
            <p class="text-muted small mb-0">Log in to continue shopping</p>
        </div>

        <form id="loginForm">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Email</label>
                <input type="email" class="form-control" id="loginEmail" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Password</label>
                <input type="password" class="form-control" id="loginPassword" required>
            </div>
            <div class="d-flex justify-content-between align-items-center mb-3">
                <div class="form-check">
                    <input class="form-check-input" type="checkbox" id="rememberMe">
                    <label class="form-check-label small" for="rememberMe">Remember me</label>
                </div>
                <button type="button" class="btn btn-link btn-sm p-0 text-decoration-none" data-bs-toggle="modal" data-bs-target="#forgotPasswordModal">Forgot password?</button>
            </div>
            <button type="submit" class="btn btn-brand w-100">Log in</button>
        </form>

        <p class="text-center small text-muted mt-4 mb-0">
            New here? <a href="/register" class="text-brand fw-semibold text-decoration-none">Create an account</a>
        </p>
    </div>
</main>

<!-- Forgot password modal -->
<div class="modal fade" id="forgotPasswordModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Reset your password</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="forgotPasswordForm">
                <div class="modal-body">
                    <p class="small text-muted">Enter your account email — we'll generate a reset link. (In this demo build, no email server is configured yet, so check the application logs for the reset token.)</p>
                    <input type="email" class="form-control" id="forgotEmail" placeholder="you@example.com" required>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-brand">Send reset link</button>
                </div>
            </form>
        </div>
    </div>
</div>

<div th:replace="~{store/fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/storefront-common.js}"></script>
<script th:src="@{/js/auth-login.js}"></script>
</body>
</html>
