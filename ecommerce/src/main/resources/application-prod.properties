spring.application.name=ecommerce

# PostgreSQL (Render provides these as environment variables)
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}
spring.datasource.driverClassName=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# H2 console must stay off in production
spring.h2.console.enabled=false

# Server (Render assigns the port dynamically)
server.port=${PORT:9090}

# JWT (set as a real secret in Render's environment variables, don't reuse the dev one)
app.jwt.secret=${JWT_SECRET}
app.jwt.expiration-ms=86400000
app.jwt.cookie-name=ecom_token

# Thymeleaf caching should be ON in production for performance
spring.thymeleaf.cache=true

# Error handling
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-exception=false

# Admin seeder — override these in Render's environment variables too
app.admin.email=${ADMIN_EMAIL:admin@suprithstore.com}
app.admin.password=${ADMIN_PASSWORD:Admin@123}
