<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title id="pageTitle">Product · Suprith Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
    <style>
        .gallery-main { aspect-ratio: 1; background:#f4f4f6; border-radius: var(--radius-lg); overflow:hidden; cursor: zoom-in; }
        .gallery-main img { width:100%; height:100%; object-fit:cover; transition: transform 0.2s ease; }
        .gallery-main.zoomed img { transform: scale(1.8); cursor: zoom-out; }
        .gallery-thumb { width:64px; height:64px; border-radius:10px; overflow:hidden; border:2px solid transparent; cursor:pointer; }
        .gallery-thumb.active { border-color: var(--brand); }
        .gallery-thumb img { width:100%; height:100%; object-fit:cover; }
    </style>
</head>
<body class="storefront">

<div th:replace="~{store/fragments/navbar :: navbar}"></div>

<main class="container py-4" id="productRoot">
    <div class="row g-4">
        <div class="col-12" id="loadingState">
            <div class="skeleton" style="height:400px"></div>
        </div>
    </div>
</main>

<div th:replace="~{store/fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/storefront-common.js}"></script>
<script th:src="@{/js/store-product-detail.js}"></script>
</body>
</html>
