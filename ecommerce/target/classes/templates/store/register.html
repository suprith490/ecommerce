<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create account · Suprith Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
</head>
<body class="storefront">

<div th:replace="~{store/fragments/navbar :: navbar}"></div>

<main class="container">
    <div class="auth-card card-surface p-4 p-md-5">
        <div class="text-center mb-4">
            <h1 class="h3 fw-bold">Create your account</h1>
            <p class="text-muted small mb-0">Join Suprith Store in seconds</p>
        </div>

        <form id="registerForm">
            <div class="mb-3">
                <label class="form-label small fw-semibold">Full name</label>
                <input type="text" class="form-control" id="regName" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Email</label>
                <input type="email" class="form-control" id="regEmail" required>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Password</label>
                <input type="password" class="form-control" id="regPassword" minlength="6" required>
                <div class="form-text">At least 6 characters.</div>
            </div>
            <div class="mb-3">
                <label class="form-label small fw-semibold">Confirm password</label>
                <input type="password" class="form-control" id="regConfirmPassword" minlength="6" required>
            </div>
            <button type="submit" class="btn btn-brand w-100">Create account</button>
        </form>

        <p class="text-center small text-muted mt-4 mb-0">
            Already have an account? <a href="/login" class="text-brand fw-semibold text-decoration-none">Log in</a>
        </p>
    </div>
</main>

<div th:replace="~{store/fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/storefront-common.js}"></script>
<script th:src="@{/js/auth-register.js}"></script>
</body>
</html>
