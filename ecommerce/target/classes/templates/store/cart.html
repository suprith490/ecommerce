<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your cart · Suprith Store</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/storefront.css}">
</head>
<body class="storefront">

<div th:replace="~{store/fragments/navbar :: navbar}"></div>

<main class="container py-4">
    <h1 class="h4 fw-bold mb-4">Your cart</h1>

    <div class="row g-4">
        <div class="col-12 col-lg-8">
            <div id="cartItemsContainer" class="d-flex flex-column gap-3">
                <div class="skeleton" style="height:6rem"></div>
            </div>
        </div>

        <div class="col-12 col-lg-4">
            <div class="card-surface p-3 mb-3">
                <h2 class="h6 fw-bold mb-3">Have a coupon?</h2>
                <div class="input-group input-group-sm">
                    <input type="text" class="form-control text-uppercase" id="couponInput" placeholder="Enter code">
                    <button class="btn btn-outline-brand" id="applyCouponBtn">Apply</button>
                </div>
                <div id="couponMessage" class="small mt-2"></div>
            </div>

            <div class="card-surface p-3">
                <h2 class="h6 fw-bold mb-3">Order summary</h2>
                <div id="orderSummary" class="small">
                    <div class="skeleton" style="height:6rem"></div>
                </div>
                <a href="/checkout" class="btn btn-brand w-100 mt-3" id="checkoutBtn">Proceed to checkout</a>
            </div>
        </div>
    </div>
</main>

<div th:replace="~{store/fragments/footer :: footer}"></div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/storefront-common.js}"></script>
<script th:src="@{/js/store-cart.js}"></script>
</body>
</html>
