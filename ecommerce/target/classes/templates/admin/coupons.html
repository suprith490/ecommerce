<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coupons · Suprith Store Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">

<div th:replace="~{admin/fragments/sidebar :: sidebar('coupons')}"></div>
<div th:replace="~{admin/fragments/topnav :: topnav('Coupons')}"></div>

<main class="admin-main">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0" id="resultCount">Loading coupons…</p>
        <button class="btn btn-gradient" id="addCouponBtn"><i class="fa-solid fa-plus me-2"></i>Add coupon</button>
    </div>

    <div class="glass-card p-3">
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                <tr><th>Code</th><th>Discount</th><th>Min. order</th><th>Expiry</th><th>Usage</th><th>Status</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody id="couponsBody">
                <tr><td colspan="7"><div class="skeleton" style="height:1.2rem"></div></td></tr>
                </tbody>
            </table>
        </div>
    </div>
</main>

<div class="modal fade" id="couponModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title" id="couponModalTitle">Add coupon</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <form id="couponForm">
                <div class="modal-body">
                    <input type="hidden" id="couponId">
                    <div class="row g-3">
                        <div class="col-12">
                            <label class="form-label small fw-semibold">Coupon code</label>
                            <input type="text" class="form-control font-mono text-uppercase" id="coCode" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Discount type</label>
                            <select class="form-select" id="coType">
                                <option value="PERCENTAGE">Percentage</option>
                                <option value="FLAT">Flat amount</option>
                            </select>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Discount value</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="coValue" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Min. order amount (₹)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="coMinOrder" value="0">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Max discount (₹, % only)</label>
                            <input type="number" step="0.01" min="0" class="form-control" id="coMaxDiscount">
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Expiry date</label>
                            <input type="datetime-local" class="form-control" id="coExpiry" required>
                        </div>
                        <div class="col-6">
                            <label class="form-label small fw-semibold">Usage limit (blank = unlimited)</label>
                            <input type="number" min="1" class="form-control" id="coUsageLimit">
                        </div>
                        <div class="col-12">
                            <div class="form-check form-switch">
                                <input class="form-check-input" type="checkbox" id="coActive" checked>
                                <label class="form-check-label small" for="coActive">Active</label>
                            </div>
                        </div>
                    </div>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-light" data-bs-dismiss="modal">Cancel</button>
                    <button type="submit" class="btn btn-gradient">Save coupon</button>
                </div>
            </form>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/admin-common.js}"></script>
<script th:src="@{/js/admin-coupons.js}"></script>
</body>
</html>
