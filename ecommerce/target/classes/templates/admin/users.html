<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Users · Suprith Store Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">

<div th:replace="~{admin/fragments/sidebar :: sidebar('users')}"></div>
<div th:replace="~{admin/fragments/topnav :: topnav('Users')}"></div>

<main class="admin-main">
    <div class="d-flex justify-content-between align-items-center mb-3 gap-3">
        <p class="text-muted mb-0" id="resultCount">Loading users…</p>
        <input type="search" class="form-control" style="max-width:280px" id="searchInput" placeholder="Search by name or email…">
    </div>

    <div class="glass-card p-3">
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                <tr><th>Name</th><th>Email</th><th>Role</th><th>Status</th><th>Joined</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody id="usersBody">
                <tr><td colspan="6"><div class="skeleton" style="height:1.2rem"></div></td></tr>
                </tbody>
            </table>
        </div>

        <nav class="d-flex justify-content-between align-items-center mt-3">
            <span class="small text-muted" id="pageLabel"></span>
            <div class="btn-group">
                <button class="btn btn-sm btn-light" id="prevPageBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn btn-sm btn-light" id="nextPageBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </nav>
    </div>
</main>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/admin-common.js}"></script>
<script th:src="@{/js/admin-users.js}"></script>
</body>
</html>
