<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Orders · Suprith Store Admin</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@500&display=swap" rel="stylesheet">

    <link rel="stylesheet" th:href="@{/webjars/bootstrap/css/bootstrap.min.css}">
    <link rel="stylesheet" th:href="@{/webjars/font-awesome/css/all.min.css}">
    <link rel="stylesheet" th:href="@{/css/admin.css}">
</head>
<body class="admin-shell">

<div th:replace="~{admin/fragments/sidebar :: sidebar('orders')}"></div>
<div th:replace="~{admin/fragments/topnav :: topnav('Orders')}"></div>

<main class="admin-main">
    <div class="d-flex justify-content-between align-items-center mb-3">
        <p class="text-muted mb-0" id="resultCount">Loading orders…</p>
    </div>

    <div class="glass-card p-3">
        <div class="table-responsive">
            <table class="table admin-table mb-0">
                <thead>
                <tr><th>Order #</th><th>Customer</th><th>Status</th><th>Payment</th><th>Total</th><th>Placed</th><th class="text-end">Actions</th></tr>
                </thead>
                <tbody id="ordersBody">
                <tr><td colspan="7"><div class="skeleton" style="height:1.2rem"></div></td></tr>
                </tbody>
            </table>
        </div>

        <nav class="d-flex justify-content-between align-items-center mt-3">
            <span class="small text-muted" id="pageLabel"></span>
            <div class="btn-group">
                <button class="btn btn-sm btn-light" id="prevPageBtn"><i class="fa-solid fa-chevron-left"></i></button>
                <button class="btn btn-sm btn-light" id="nextPageBtn"><i class="fa-solid fa-chevron-right"></i></button>
            </div>
        </nav>
    </div>
</main>

<!-- Order Detail Modal -->
<div class="modal fade" id="orderModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-scrollable">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title font-mono" id="orderModalTitle">Order</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body" id="orderModalBody">
                <div class="skeleton" style="height:8rem"></div>
            </div>
            <div class="modal-footer">
                <select class="form-select form-select-sm" id="statusSelect" style="max-width:220px">
                    <option value="PLACED">Placed</option>
                    <option value="CONFIRMED">Confirmed</option>
                    <option value="PACKED">Packed</option>
                    <option value="SHIPPED">Shipped</option>
                    <option value="OUT_FOR_DELIVERY">Out for delivery</option>
                    <option value="DELIVERED">Delivered</option>
                    <option value="RETURNED">Returned</option>
                </select>
                <button class="btn btn-gradient" id="updateStatusBtn">Update status</button>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/webjars/bootstrap/js/bootstrap.bundle.min.js}"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.7/sweetalert2.all.min.js"></script>
<script th:src="@{/js/admin-common.js}"></script>
<script th:src="@{/js/admin-orders.js}"></script>
</body>
</html>
