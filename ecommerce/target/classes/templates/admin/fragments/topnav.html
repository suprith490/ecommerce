<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>
<header th:fragment="topnav(title)" class="admin-topnav">
    <div class="d-flex align-items-center gap-3">
        <button id="sidebarToggle" class="btn btn-sm btn-light border-0" aria-label="Toggle navigation">
            <i class="fa-solid fa-bars"></i>
        </button>
        <h1 class="page-title" th:text="${title}">Page title</h1>
    </div>

    <div class="d-flex align-items-center gap-3">
        <button class="btn btn-sm btn-light border-0 position-relative" aria-label="Notifications">
            <i class="fa-regular fa-bell"></i>
        </button>

        <div class="dropdown">
            <button class="btn d-flex align-items-center gap-2 border-0 bg-transparent p-0" type="button"
                    data-bs-toggle="dropdown" aria-expanded="false">
                <span class="admin-avatar" id="adminAvatarInitial">A</span>
            </button>
            <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0 mt-2">
                <li><span class="dropdown-item-text small text-muted" id="adminNameLabel">Admin</span></li>
                <li><hr class="dropdown-divider"></li>
                <li><a class="dropdown-item" href="/profile"><i class="fa-regular fa-user me-2"></i>My profile</a></li>
                <li><button class="dropdown-item text-danger" id="logoutBtn" type="button">
                    <i class="fa-solid fa-right-from-bracket me-2"></i>Logout</button></li>
            </ul>
        </div>
    </div>
</header>
</body>
</html>
