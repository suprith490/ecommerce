spring.application.name=ecommerce

# H2 Database
spring.datasource.url=jdbc:h2:file:./data/ecommerce;AUTO_SERVER=TRUE
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# H2 Console
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Server
server.port=9090

# JWT
app.jwt.secret=8f42d9c1a6b3e7f05d2c9a4b8e1f6d3c7a9b2e5f8d1c4a7b0e3f6d9c2a5b8e1f
app.jwt.expiration-ms=86400000
app.jwt.cookie-name=ecom_token

# Thymeleaf (disable caching in dev for instant template reload)
spring.thymeleaf.cache=false

# Error handling — custom templates/error/{404,403,500,error}.html take over from Spring's whitelabel page
server.error.whitelabel.enabled=false
server.error.include-stacktrace=never
server.error.include-exception=false